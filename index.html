<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Machine Inspection Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:Arial;
  background:#eef2f7;
  margin:20px;
}

.header{
  background:#183b63;
  color:white;
  padding:15px;
  border-radius:10px;
  font-size:22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.menu button{
  background:#2c7be5;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
  margin-left:6px;
}

.cards{
  display:flex;
  gap:15px;
  margin-top:20px;
}

.card{
  flex:1;
  background:white;
  padding:20px;
  text-align:center;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:20px;
}

.chartbox{
  background:white;
  padding:20px;
  border-radius:10px;
}

table{
  width:100%;
  margin-top:20px;
  background:white;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
}

.pass{
  color:green;
  font-weight:bold;
}

.fail{
  color:red;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
Machine Inspection Dashboard

<div class="menu">
<button onclick="loadData('after')">หลังการใช้งาน</button>
<button onclick="loadData('month4')">ทุก 4 เดือน</button>
<button onclick="loadData('year')">รายปี</button>
</div>

</div>

<div class="cards">

<div class="card">
ตรวจทั้งหมด
<h1 id="total">0</h1>
</div>

<div class="card">
ผ่าน
<h1 id="pass">0</h1>
</div>

<div class="card">
ไม่ผ่าน
<h1 id="fail">0</h1>
</div>

<div class="card">
อัตราผ่าน
<h1 id="rate">0%</h1>
</div>

</div>

<div class="grid">

<div class="chartbox">
<canvas id="pieChart"></canvas>
</div>

<div class="chartbox">
<canvas id="barChart"></canvas>
</div>

</div>

<table>

<thead>
<tr>
<th>วันและเวลา</th>
<th>รายการ</th>
<th>สถานะ</th>
</tr>
</thead>

<tbody id="tableData"></tbody>

</table>

<script>

const sheets = {

after:"https://opensheet.elk.sh/1yJzZF5Ta6VQ-Endm9g4uAbv-Ov7I629DiMS3OkF7pd8/เอาไว้เก็บข้อมูลหลังการใช้งาน",

month4:"https://opensheet.elk.sh/1yJzZF5Ta6VQ-Endm9g4uAbv-Ov7I629DiMS3OkF7pd8/เอาไว้เก็บข้อมูลทุก 4 เดือน",

year:"https://opensheet.elk.sh/1yJzZF5Ta6VQ-Endm9g4uAbv-Ov7I629DiMS3OkF7pd8/เอาไว้เก็บข้อมูลรายปี"

}

let pieChart
let barChart

async function loadData(type="after"){

const res = await fetch(sheets[type])
const sheet = await res.json()

const data = sheet.map(r=>({
date:r["วันและเวลา"],
item:r["รายการ"],
status:r["สถานะ"]
}))

renderDashboard(data)

}

function renderDashboard(data){

let total=data.length
let pass=data.filter(d=>d.status==="ผ่าน").length
let fail=data.filter(d=>d.status==="ไม่ผ่าน").length
let rate = total ? ((pass/total)*100).toFixed(0) : 0

document.getElementById("total").innerText=total
document.getElementById("pass").innerText=pass
document.getElementById("fail").innerText=fail
document.getElementById("rate").innerText=rate+"%"

renderPie(pass,fail)
renderBar(data)
renderTable(data)

}

function renderPie(pass,fail){

if(pieChart) pieChart.destroy()

pieChart=new Chart(document.getElementById("pieChart"),{

type:"pie",

data:{
labels:["ผ่าน","ไม่ผ่าน"],
datasets:[{
data:[pass,fail],
backgroundColor:["#2ecc71","#e74c3c"]
}]
}

})

}

function renderBar(data){

let items={}

data.forEach(d=>{

if(!items[d.item]) items[d.item]={pass:0,fail:0}

if(d.status==="ผ่าน") items[d.item].pass++
else items[d.item].fail++

})

let labels=[]
let pass=[]
let fail=[]

for(let i in items){

labels.push(i)
pass.push(items[i].pass)
fail.push(items[i].fail)

}

if(barChart) barChart.destroy()

barChart=new Chart(document.getElementById("barChart"),{

type:"bar",

data:{
labels:labels,
datasets:[
{
label:"ผ่าน",
data:pass,
backgroundColor:"#2ecc71"
},
{
label:"ไม่ผ่าน",
data:fail,
backgroundColor:"#e74c3c"
}
]
}

})

}

function renderTable(data){

const table=document.getElementById("tableData")
table.innerHTML=""

data.forEach(d=>{

let row=`
<tr>
<td>${d.date || ""}</td>
<td>${d.item || ""}</td>
<td class="${d.status==="ผ่าน"?"pass":"fail"}">${d.status || ""}</td>
</tr>
`

table.innerHTML+=row

})

}

loadData("after")
/* อัพเดทอัตโนมัติทุก 30 วินาที */
setInterval(loadData,30000);

</script>

</body>
</html>
